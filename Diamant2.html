<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxiGame: Cyber Collector Pro v2</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon: #4ecca3; 
            --danger: #e94560; 
            --bg: #0a0a12; 
            --accent: #00BFFF;
        }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            touch-action: none;
        }

        #game-container { 
            position: relative; 
            width: 100vw; 
            max-width: 450px; 
            height: 85vh; 
            background: radial-gradient(circle, #16213e 0%, #0a0a12 100%);
            border: 2px solid var(--neon); 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.15);
        }

        #player { 
            position: absolute; 
            bottom: 30px; 
            width: 70px; 
            height: 15px; 
            background: var(--neon); 
            box-shadow: 0 0 20px var(--neon); 
            border-radius: 20px; 
            left: 50%;
            transform: translateX(-50%);
            transition: background 0.3s;
        }

        .item { 
            position: absolute; 
            font-size: 28px; 
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            user-select: none;
        }

        #ui { 
            position: absolute; 
            top: 0; left: 0; right: 0; 
            padding: 15px;
            display: flex; 
            justify-content: space-between; 
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            z-index: 10; 
        }

        .lvl-badge {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        #overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(5, 5, 10, 0.95); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            padding: 20px; 
            text-align: center; 
        }

        input { 
            padding: 12px; 
            border-radius: 5px; 
            border: 1px solid var(--neon); 
            margin-bottom: 10px; 
            width: 80%; 
            background: #111; 
            color: white; 
            text-align: center;
        }

        button { 
            padding: 12px 25px; 
            background: var(--neon); 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 30px; 
            color: #0a0a12;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4);
        }

        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th { color: var(--neon); font-size: 12px; padding-bottom: 10px; }
        td { padding: 8px; border-bottom: 1px solid #222; font-size: 14px; font-family: monospace; }
        
        /* Efectos de partículas */
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            pointer-events: none;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">❤️❤️❤️</div>
    </div>
    <div class="lvl-badge" id="level-name">Fase 1: Conexión</div>
    <div id="player"></div>

    <div id="overlay">
        <h1 id="status-title" style="color:var(--danger)">CONEXIÓN PERDIDA</h1>
        <div id="save-section">
            <input type="text" id="username" placeholder="OPERADOR ID" maxlength="12">
            <button onclick="saveScore()">Sincronizar Récord</button>
        </div>
        <div id="leaderboard-area" style="width: 100%;">
            <h3 style="margin-top:20px; font-size: 14px;">RANKING GLOBAL</h3>
            <table>
                <thead><tr><th>DATA_NODE</th><th>UNITS</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
            <br>
            <button onclick="location.reload()" style="background: white;">Reiniciar</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDdwqmNnw8d5oKeEM1SmpYh0SJOO79OoMU",
      authDomain: "maxiqueen-os-3982f.firebaseapp.com",
      projectId: "maxiqueen-os-3982f",
      databaseURL: "https://maxiqueen-os-3982f-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let score = 0, lives = 3, active = true, level = 1;
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const playerWidth = 70;

    // Adaptabilidad Mobile/PC
    const movePlayer = (clientX) => {
        const rect = container.getBoundingClientRect();
        let x = clientX - rect.left;
        let pos = x - (playerWidth / 2);
        player.style.left = Math.max(0, Math.min(pos, rect.width - playerWidth)) + 'px';
    };

    container.addEventListener('mousemove', (e) => movePlayer(e.clientX));
    container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        movePlayer(e.touches[0].clientX);
    }, { passive: false });

    function createParticle(x, y, color) {
        for(let i=0; i<8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.background = color;
            container.appendChild(p);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 50 + 20;
            p.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
            ], { duration: 500, easing: 'ease-out' }).onfinish = () => p.remove();
        }
    }

    function updateLevel() {
        const phases = [
            "Fase 1: Conexión", 
            "Fase 2: Transmisión", 
            "Fase 3: Sobrecarga", 
            "Fase 4: Criptografía", 
            "Fase 5: Núcleo"
        ];
        let newLevel = Math.floor(score / 100) + 1;
        if(newLevel !== level) {
            level = newLevel;
            const phaseName = phases[Math.min(level-1, 4)];
            document.getElementById('level-name').innerText = phaseName;
            // Feedback visual de nivel
            container.style.borderColor = level % 2 === 0 ? 'var(--accent)' : 'var(--neon)';
            player.style.background = level % 2 === 0 ? 'var(--accent)' : 'var(--neon)';
        }
    }

    function spawn() {
        if(!active) return;

        const item = document.createElement('div');
        const rand = Math.random();
        
        // Probabilidades avanzadas
        let type = '💎'; // Gema normal
        let isTrap = false;
        
        if(rand > 0.8) { type = '👾'; isTrap = true; } // Trampa
        else if(rand < 0.05) { type = '⚡'; } // Super velocidad/puntos

        item.className = 'item';
        item.innerText = type;
        item.style.left = Math.random() * (container.offsetWidth - 30) + 'px';
        item.style.top = '-40px';
        container.appendChild(item);

        let speed = 3 + (level * 0.8) + (score / 200);
        
        function fall() {
            if(!active) { item.remove(); return; }
            
            let top = parseFloat(item.style.top) + speed;
            item.style.top = top + 'px';

            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.bottom >= pRect.top && iRect.top <= pRect.bottom && 
                iRect.left <= pRect.right && iRect.right >= pRect.left) {
                
                if(isTrap) {
                    lives--;
                    createParticle(iRect.left, iRect.top, 'var(--danger)');
                    container.animate([{boxShadow: "inset 0 0 20px red"}, {boxShadow: "none"}], 300);
                } else {
                    let points = type === '⚡' ? 30 : 10;
                    score += points;
                    createParticle(iRect.left, iRect.top, type === '⚡' ? 'yellow' : 'var(--neon)');
                }

                document.getElementById('score').innerText = `SCORE: ${score}`;
                document.getElementById('lives').innerText = '❤️'.repeat(Math.max(0, lives));
                updateLevel();
                
                if(lives <= 0) endGame();
                item.remove();
            } else if (top > container.offsetHeight) {
                item.remove();
            } else {
                requestAnimationFrame(fall);
            }
        }
        requestAnimationFrame(fall);
        
        let nextSpawn = Math.max(150, 800 - (level * 100));
        setTimeout(spawn, nextSpawn);
    }

    function endGame() {
        active = false;
        document.getElementById('overlay').style.display = 'flex';
        loadLeaderboard();
    }

    function saveScore() {
        const name = document.getElementById('username').value.trim() || "ANÓNIMO";
        if(score > 0) {
            database.ref('leaderboard').push({ name, score, date: Date.now() });
            document.getElementById('save-section').innerHTML = "<p style='color:var(--neon)'>NODO SINCRONIZADO</p>";
        }
    }

    function loadLeaderboard() {
        database.ref('leaderboard').orderByChild('score').limitToLast(5).on('value', (snap) => {
            let list = [];
            snap.forEach(c => list.push(c.val()));
            list.reverse();
            document.getElementById('leaderboard-body').innerHTML = list.map(s => 
                `<tr><td>${s.name}</td><td>${s.score}</td></tr>`).join('');
        });
    }

    // Inicio
    spawn();
</script>
</body>
</html>

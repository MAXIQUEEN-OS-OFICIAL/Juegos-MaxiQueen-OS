<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake: Advanced Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --color-yellow: #FFD700;
            --color-blue: #00BFFF;
            --color-red: #FF3333;
            --bg-color: #0d0d12;
            --grid-color: #1a1a24;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            color: white;
            font-family: 'Orbitron', sans-serif;
            flex-direction: column;
            overflow: hidden;
            touch-action: none; /* Evita scroll en móviles */
        }

        #ui-layer {
            display: flex;
            justify-content: space-between;
            width: 400px;
            max-width: 95vw;
            margin-bottom: 10px;
            z-index: 10;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        #game-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            max-width: 95vw;
            max-height: 95vw;
        }

        canvas {
            background-color: #050505;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.15), inset 0 0 20px rgba(0, 0, 0, 0.8);
            width: 100%;
            height: 100%;
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            backdrop-filter: blur(3px);
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(45deg, var(--color-blue), #0055ff);
            color: white;
            border: none;
            border-radius: 25px;
            box-shadow: 0 0 15px var(--color-blue);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px var(--color-blue);
        }

        /* Controles móviles */
        #mobile-controls {
            display: none;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
            margin-top: 20px;
        }

        .d-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        
        .d-btn:active { background: rgba(255, 255, 255, 0.3); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        @media (max-width: 768px) {
            #mobile-controls { display: grid; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-box" id="scoreBoard">Score: 0</div>
        <div class="score-box" id="highScoreBoard">High: 0</div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <h1 id="overlay-title" style="margin:0; text-shadow: 0 0 10px var(--color-blue);">SYSTEM READY</h1>
            <button id="actionBtn" onclick="startGame()">INICIAR</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="d-btn" id="btn-up">▲</div>
        <div class="d-btn" id="btn-left">◀</div>
        <div class="d-btn" id="btn-right">▶</div>
        <div class="d-btn" id="btn-down">▼</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");
        const highScoreBoard = document.getElementById("highScoreBoard");
        const overlay = document.getElementById("overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const actionBtn = document.getElementById("actionBtn");

        // Configuración Core
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // Estado del Juego
        let snake = [];
        let foods = [];
        let particles = [];
        let velocity = { x: 0, y: 0 };
        let nextVelocity = { x: 0, y: 0 }; // Previene giros suicidas rápidos
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let isPlaying = false;
        
        // Temporizadores y renderizado
        let lastRenderTime = 0;
        let snakeSpeed = 8; // Movimientos por segundo
        let shakeTime = 0;

        highScoreBoard.innerText = "High: " + highScore;

        // Tipos de recolección (Amarillo, Azul, Rojo)
        const foodTypes = [
            { type: 'normal', color: '#FF3333', points: 10, prob: 0.7, glow: 'rgba(255, 51, 51, 0.5)' }, // Rojo
            { type: 'bonus', color: '#00BFFF', points: 30, prob: 0.2, glow: 'rgba(0, 191, 255, 0.5)' }, // Azul
            { type: 'special', color: '#FFD700', points: 50, prob: 0.1, glow: 'rgba(255, 215, 0, 0.5)' } // Amarillo
        ];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.05;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function screenShake(duration) {
            shakeTime = duration;
        }

        function startGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            velocity = { x: 0, y: -1 };
            nextVelocity = { x: 0, y: -1 };
            score = 0;
            snakeSpeed = 8;
            foods = [];
            particles = [];
            spawnFood();
            
            scoreBoard.innerText = "Score: " + score;
            overlay.classList.add("hidden");
            isPlaying = true;
            window.requestAnimationFrame(mainLoop);
        }

        function spawnFood() {
            if(foods.length > 2) return; // Máximo 3 items en pantalla

            let newX, newY, validPosition;
            do {
                validPosition = true;
                newX = Math.floor(Math.random() * tileCount);
                newY = Math.floor(Math.random() * tileCount);
                
                // Evitar que aparezca en la serpiente
                for (let segment of snake) {
                    if (segment.x === newX && segment.y === newY) validPosition = false;
                }
                // Evitar que aparezca encima de otra comida
                for (let f of foods) {
                    if (f.x === newX && f.y === newY) validPosition = false;
                }
            } while (!validPosition);

            // Determinar tipo de comida por probabilidad
            let rand = Math.random();
            let selectedType = foodTypes[0];
            let cumulative = 0;
            for (let ft of foodTypes) {
                cumulative += ft.prob;
                if (rand <= cumulative) {
                    selectedType = ft;
                    break;
                }
            }

            foods.push({ x: newX, y: newY, ...selectedType });
        }

        function gameOver() {
            isPlaying = false;
            screenShake(20);
            createExplosion(snake[0].x * gridSize, snake[0].y * gridSize, '#FFFFFF', 40);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreBoard.innerText = "High: " + highScore;
            }

            setTimeout(() => {
                overlayTitle.innerText = "CRITICAL FAILURE";
                overlayTitle.style.color = "var(--color-red)";
                actionBtn.innerText = "REINICIAR SISTEMA";
                overlay.classList.remove("hidden");
            }, 800);
        }

        function updateSnake() {
            velocity = { ...nextVelocity };
            
            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            // Colisión con paredes
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Colisión consigo misma
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // Colisión con comida
            let ate = false;
            for (let i = 0; i < foods.length; i++) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    score += foods[i].points;
                    scoreBoard.innerText = "Score: " + score;
                    createExplosion(foods[i].x * gridSize + gridSize/2, foods[i].y * gridSize + gridSize/2, foods[i].color);
                    foods.splice(i, 1);
                    ate = true;
                    
                    // Aumentar dificultad levemente
                    if(score % 100 === 0) snakeSpeed += 1;
                    
                    spawnFood();
                    // Posibilidad de spawnear una segunda comida si comió
                    if(Math.random() > 0.6) spawnFood(); 
                    break;
                }
            }

            if (!ate) {
                snake.pop();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "var(--grid-color)";
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        // Loop principal (Renderizado a 60FPS)
        function mainLoop(currentTime) {
            if (!isPlaying && particles.length === 0) return;
            window.requestAnimationFrame(mainLoop);

            const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;

            // Actualizar lógica de la serpiente a velocidad controlada
            if (isPlaying && secondsSinceLastRender >= 1 / snakeSpeed) {
                lastRenderTime = currentTime;
                updateSnake();
            }

            // --- RENDERIZADO ---
            ctx.save();
            
            // Aplicar Screen Shake
            if (shakeTime > 0) {
                const dx = (Math.random() - 0.5) * 10;
                const dy = (Math.random() - 0.5) * 10;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // Limpiar fondo
            ctx.fillStyle = "var(--bg-color)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();

            // Dibujar Comida con efecto Glow
            foods.forEach(f => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = f.color;
                ctx.fillStyle = f.color;
                // Efecto de pulsación
                const pulse = Math.sin(Date.now() / 200) * 2;
                ctx.fillRect(f.x * gridSize + 2 - pulse/2, f.y * gridSize + 2 - pulse/2, gridSize - 4 + pulse, gridSize - 4 + pulse);
                ctx.shadowBlur = 0; // reset
            });

            // Dibujar Serpiente
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = "#ffffff"; // Cabeza blanca
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "var(--color-blue)";
                } else {
                    // Gradiente cibernético para el cuerpo
                    ctx.fillStyle = `hsl(195, 100%, ${Math.max(20, 70 - index * 2)}%)`;
                    ctx.shadowBlur = 0;
                }
                
                // Diseño de bloques con margen interno
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });

            // Actualizar y dibujar partículas (a 60fps)
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            ctx.restore();
        }

        // --- CONTROLES ---
        function changeDirection(newX, newY) {
            // Evitar giro 180 (ir a la dirección opuesta al instante)
            if (newX !== 0 && velocity.x === -newX) return;
            if (newY !== 0 && velocity.y === -newY) return;
            nextVelocity = { x: newX, y: newY };
        }

        window.addEventListener('keydown', e => {
            if (!isPlaying) {
                if (e.key === 'Enter' || e.key === ' ') startGame();
                return;
            }
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection(1, 0); break;
            }
        });

        // Eventos táctiles para botones en pantalla
        document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, -1); });
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, 1); });
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(-1, 0); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(1, 0); });
        
        // Soporte para clicks en los botones móviles (si se prueba en PC achicando la ventana)
        document.getElementById('btn-up').addEventListener('mousedown', () => changeDirection(0, -1));
        document.getElementById('btn-down').addEventListener('mousedown', () => changeDirection(0, 1));
        document.getElementById('btn-left').addEventListener('mousedown', () => changeDirection(-1, 0));
        document.getElementById('btn-right').addEventListener('mousedown', () => changeDirection(1, 0));

        // Render inicial para mostrar la cuadrícula de fondo
        drawGrid();

    </script>
</body>
</html>

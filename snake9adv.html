<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Snake Protocol: Neon Ascension</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #ff00ff;
            --yellow: #ffff00;
            --bg: #020205;
        }
        body {
            background-color: var(--bg);
            color: var(--cyan);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--cyan);
        }
        canvas {
            border: 3px solid var(--cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15), inset 0 0 20px rgba(0, 242, 255, 0.1);
            background: radial-gradient(circle, #0a0a1a 0%, #020205 100%);
        }
        .controls-hint {
            margin-top: 15px;
            font-size: 10px;
            color: rgba(0, 242, 255, 0.5);
        }
        #lvl-up-msg {
            position: absolute;
            font-size: 40px;
            display: none;
            animation: pulse 0.5s infinite;
            z-index: 10;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; color: var(--magenta); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="hud">
        <span>LVL: <span id="lvl">1</span></span>
        <span id="score">DATA: 0000</span>
    </div>
    
    <div id="lvl-up-msg">LEVEL UP</div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls-hint">USAR FLECHAS PARA NAVEGAR EL PROTOCOLO</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const lvlEl = document.getElementById("lvl");
        const lvlMsg = document.getElementById("lvl-up-msg");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, powerUp, obstacles, d, score, level, gameSpeed, isGameOver;
        let shakeFrames = 0;

        // Configuración de niveles
        const levelConfig = {
            1: { target: 50, speed: 100, walls: [] },
            2: { target: 150, speed: 85, walls: [
                {x: 5, y: 5, w: 10, h: 1}, {x: 5, y: 14, w: 10, h: 1} // Muros horizontales
            ]},
            3: { target: 300, speed: 70, walls: [
                {x: 4, y: 4, w: 1, h: 12}, {x: 15, y: 4, w: 1, h: 12}, // Muros verticales
                {x: 8, y: 10, w: 4, h: 1}
            ]}
        };

        function init() {
            snake = [{x: 10 * gridSize, y: 10 * gridSize}];
            d = "RIGHT";
            score = 0;
            level = 1;
            isGameOver = false;
            obstacles = [];
            powerUp = null;
            loadLevel(1);
            placeFood();
            loop();
        }

        function loadLevel(lvl) {
            level = lvl;
            lvlEl.innerText = level;
            gameSpeed = levelConfig[level].speed;
            obstacles = [];
            levelConfig[level].walls.forEach(w => {
                for(let i=0; i<w.w; i++) {
                    for(let j=0; j<w.h; j++) {
                        obstacles.push({x: (w.x + i) * gridSize, y: (w.y + j) * gridSize});
                    }
                }
            });
            
            // Animación visual de cambio de nivel
            lvlMsg.style.display = "block";
            setTimeout(() => lvlMsg.style.display = "none", 1500);
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount) * gridSize,
                y: Math.floor(Math.random() * tileCount) * gridSize
            };
            // Evitar spawn en obstáculos o serpiente
            if (obstacles.some(o => o.x === food.x && o.y === food.y) || 
                snake.some(s => s.x === food.x && s.y === food.y)) {
                placeFood();
            }
        }

        function spawnPowerUp() {
            if (Math.random() > 0.8 && !powerUp) {
                powerUp = {
                    x: Math.floor(Math.random() * tileCount) * gridSize,
                    y: Math.floor(Math.random() * tileCount) * gridSize,
                    life: 50 // Duración limitada
                };
            }
        }

        document.addEventListener("keydown", e => {
            const keys = {37: "LEFT", 38: "UP", 39: "RIGHT", 40: "DOWN"};
            const newD = keys[e.keyCode];
            if (!newD) return;
            const opposites = {"LEFT":"RIGHT", "RIGHT":"LEFT", "UP":"DOWN", "DOWN":"UP"};
            if (newD !== opposites[d]) d = newD;
        });

        function update() {
            if (isGameOver) return;

            let headX = snake[0].x;
            let headY = snake[0].y;

            if (d === "LEFT") headX -= gridSize;
            if (d === "UP") headY -= gridSize;
            if (d === "RIGHT") headX += gridSize;
            if (d === "DOWN") headY += gridSize;

            // Colisión con paredes o límites
            const hitWall = obstacles.some(o => o.x === headX && o.y === headY);
            if (headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || hitWall || 
                snake.some(s => s.x === headX && s.y === headY)) {
                isGameOver = true;
                return;
            }

            const newHead = {x: headX, y: headY};

            // Comer Food
            if (headX === food.x && headY === food.y) {
                score += 10;
                shakeFrames = 5;
                placeFood();
                spawnPowerUp();
                if (level < 3 && score >= levelConfig[level].target) loadLevel(level + 1);
            } else if (powerUp && headX === powerUp.x && headY === powerUp.y) {
                score += 50;
                powerUp = null;
                gameSpeed += 20; // Ralentiza (fácil) temporalmente
                setTimeout(() => gameSpeed = levelConfig[level].speed, 3000);
            } else {
                snake.pop();
            }

            snake.unshift(newHead);
            if (powerUp) {
                powerUp.life--;
                if (powerUp.life <= 0) powerUp = null;
            }
            
            scoreEl.innerText = "DATA: " + score.toString().padStart(4, '0');
        }

        function draw() {
            // Efecto Screen Shake
            ctx.save();
            if (shakeFrames > 0) {
                ctx.translate(Math.random()*5 - 2.5, Math.random()*5 - 2.5);
                shakeFrames--;
            }

            // Fondo con rejilla
            ctx.fillStyle = varColor('--bg');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "rgba(0, 242, 255, 0.05)";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.strokeRect(i, 0, 1, canvas.height);
                ctx.strokeRect(0, i, canvas.width, 1);
            }

            // Dibujar Obstáculos (Muros de Energía)
            obstacles.forEach(o => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = varColor('--magenta');
                ctx.fillStyle = varColor('--magenta');
                ctx.fillRect(o.x+1, o.y+1, gridSize-2, gridSize-2);
            });

            // Dibujar PowerUp
            if (powerUp) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = varColor('--yellow');
                ctx.fillStyle = varColor('--yellow');
                ctx.beginPath();
                ctx.arc(powerUp.x + gridSize/2, powerUp.y + gridSize/2, gridSize/3, 0, Math.PI*2);
                ctx.fill();
            }

            // Dibujar Food
            ctx.shadowBlur = 15;
            ctx.shadowColor = varColor('--cyan');
            ctx.fillStyle = "#fff";
            ctx.fillRect(food.x+4, food.y+4, gridSize-8, gridSize-8);

            // Dibujar Serpiente con efecto de degradado
            snake.forEach((s, i) => {
                ctx.shadowBlur = (i === 0) ? 20 : 5;
                ctx.shadowColor = varColor('--cyan');
                ctx.fillStyle = (i === 0) ? "#fff" : `rgba(0, 242, 255, ${1 - i/snake.length})`;
                ctx.fillRect(s.x + 1, s.y + 1, gridSize - 2, gridSize - 2);
            });

            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.shadowBlur = 20;
                ctx.shadowColor = "red";
                ctx.fillStyle = "#fff";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("PROTOCOL_TERMINATED", canvas.width/2, canvas.height/2);
                ctx.font = "12px Arial";
                ctx.fillText("CLICK PARA REINICIAR", canvas.width/2, canvas.height/2 + 30);
            }
            ctx.restore();
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function loop() {
            update();
            draw();
            if (!isGameOver) setTimeout(loop, gameSpeed);
        }

        canvas.addEventListener("click", () => { if(isGameOver) init(); });

        init();
    </script>
</body>
</html>

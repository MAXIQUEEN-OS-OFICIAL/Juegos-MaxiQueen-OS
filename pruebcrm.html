<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAXIQUEEN OS — CRM & Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary-glow: rgba(124, 58, 237, 0.5);
      --accent: #7c3aed;
      --bg-dark: #05070f;
    }
    body {
      background: radial-gradient(circle at top, #0b0f1a, var(--bg-dark));
      color: #e5e7eb;
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
    }
    .glow-hover:hover {
      box-shadow: 0 0 20px var(--primary-glow);
      border-color: var(--accent);
    }
    /* Animaciones suaves */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-8">
    
    <!-- CABECERA -->
    <header class="text-center space-y-2">
      <div class="inline-block px-3 py-1 text-xs font-bold tracking-widest text-purple-400 uppercase bg-purple-900/30 rounded-full">
        Laboratorio de Estructuras
      </div>
      <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-white to-purple-400">
        MAXIQUEEN CRM
      </h1>
      <p class="text-zinc-400">Prototipo de gestión centralizada en evolución.</p>
    </header>

    <!-- SECCIÓN CRM (Mejorada) -->
    <section class="glass-card p-6 shadow-2xl relative overflow-hidden">
      <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-white/10 pb-6">
        <div class="text-left">
          <h2 class="text-xl font-semibold text-white">Panel de Control</h2>
          <p class="text-xs text-zinc-500">Demo / Contenido en desarrollo</p>
        </div>
        <div class="flex gap-3">
          <button onclick="switchView('main')" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-xs transition">Dashboard</button>
          <a href="#" class="px-4 py-2 bg-amber-500/10 text-amber-400 border border-amber-500/20 rounded-lg text-xs hover:bg-amber-500/20 transition font-semibold">
            📄 Ver Documentación
          </a>
        </div>
      </div>

      <!-- VISTA DINÁMICA DEL CRM -->
      <div id="crm-viewport" class="min-h-[300px] fade-in">
        <!-- El contenido cambia aquí dinámicamente -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <button onclick="switchView('ventas')" class="glass-card p-6 text-left glow-hover transition-all group">
            <div class="text-3xl mb-3">📈</div>
            <h3 class="font-bold text-white group-hover:text-purple-400">Ventas</h3>
            <p class="text-xs text-zinc-400 mt-1">Monitoreo de ingresos y conversiones en tiempo real.</p>
            <div class="mt-4 text-[10px] text-purple-400 font-mono">ACCEDER →</div>
          </button>

          <button onclick="switchView('clientes')" class="glass-card p-6 text-left glow-hover transition-all group">
            <div class="text-3xl mb-3">👥</div>
            <h3 class="font-bold text-white group-hover:text-purple-400">Clientes</h3>
            <p class="text-xs text-zinc-400 mt-1">Base de datos segmentada y gestión de leads.</p>
            <div class="mt-4 text-[10px] text-purple-400 font-mono">ACCEDER →</div>
          </button>

          <button onclick="openLegal('Pipeline IA', 'Nuestro pipeline utiliza modelos cognitivos para predecir cierres de ventas basados en el comportamiento histórico de MaxiQueen OS.')" class="glass-card p-6 text-left glow-hover transition-all group">
            <div class="text-3xl mb-3">🤖</div>
            <h3 class="font-bold text-white group-hover:text-purple-400">Predictor</h3>
            <p class="text-xs text-zinc-400 mt-1">Análisis predictivo de comportamiento de mercado.</p>
            <div class="mt-4 text-[10px] text-zinc-500 font-mono">INFO LEGAL</div>
          </button>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="text-center py-8">
      <div class="text-[10px] text-zinc-600 tracking-tighter uppercase">
        MaxiQueen OS &copy; 2024 - Sistema de Gestión Unificada
      </div>
    </footer>
  </div>

  <!-- MODAL LEGAL (Mantenido y Mejorado) -->
  <div id="legalModal" class="fixed inset-0 hidden bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="bg-zinc-900 border border-white/10 text-zinc-200 max-w-xl w-full p-8 rounded-2xl shadow-2xl relative fade-in">
      <button onclick="closeLegal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <h2 id="legalTitle" class="text-2xl font-bold mb-4 text-purple-400"></h2>
      <div id="legalContent" class="text-zinc-400 leading-relaxed space-y-4 max-h-[50vh] overflow-y-auto pr-2"></div>
      <div class="mt-8 pt-6 border-t border-white/5">
        <button onclick="closeLegal()" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl transition font-semibold text-sm">Entendido</button>
      </div>
    </div>
  </div>

  <script>
    // --- LÓGICA DEL CRM ---
    const viewport = document.getElementById('crm-viewport');
    
    const views = {
      main: `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <button onclick="switchView('ventas')" class="glass-card p-6 text-left glow-hover transition-all group">
            <div class="text-3xl mb-3">📈</div>
            <h3 class="font-bold text-white group-hover:text-purple-400">Ventas</h3>
            <p class="text-xs text-zinc-400 mt-1">Monitoreo de ingresos y conversiones.</p>
            <div class="mt-4 text-[10px] text-purple-400 font-mono">ACCEDER →</div>
          </button>
          <button onclick="switchView('clientes')" class="glass-card p-6 text-left glow-hover transition-all group">
            <div class="text-3xl mb-3">👥</div>
            <h3 class="font-bold text-white group-hover:text-purple-400">Clientes</h3>
            <p class="text-xs text-zinc-400 mt-1">Gestión de base de datos y leads.</p>
            <div class="mt-4 text-[10px] text-purple-400 font-mono">ACCEDER →</div>
          </button>
          <button onclick="openLegal('Predictor MQ', 'Información sobre el algoritmo de IA.')" class="glass-card p-6 text-left glow-hover transition-all group">
            <div class="text-3xl mb-3">🤖</div>
            <h3 class="font-bold text-white group-hover:text-purple-400">Analítica</h3>
            <p class="text-xs text-zinc-400 mt-1">Proyecciones del próximo trimestre.</p>
            <div class="mt-4 text-[10px] text-zinc-500 font-mono">INFO LEGAL</div>
          </button>
        </div>
      `,
      ventas: `
        <div class="space-y-4 fade-in">
          <div class="flex justify-between items-center mb-2">
            <h3 class="font-bold text-purple-400 uppercase tracking-widest text-sm">Registro de Ventas</h3>
            <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded">LIVE</span>
          </div>
          <table class="w-full text-left text-xs border-collapse">
            <thead>
              <tr class="text-zinc-500 border-b border-white/5">
                <th class="py-2">ID</th>
                <th>Concepto</th>
                <th>Monto</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody class="text-zinc-300">
              <tr class="border-b border-white/5">
                <td class="py-3 font-mono text-zinc-500">#MQ-001</td>
                <td>Suscripción OS Pro</td>
                <td class="font-bold text-white">$49.00</td>
                <td><span class="bg-green-500/10 text-green-500 px-2 py-1 rounded text-[9px]">Completado</span></td>
              </tr>
              <tr class="border-b border-white/5">
                <td class="py-3 font-mono text-zinc-500">#MQ-002</td>
                <td>Consultoría IA</td>
                <td class="font-bold text-white">$150.00</td>
                <td><span class="bg-amber-500/10 text-amber-500 px-2 py-1 rounded text-[9px]">Pendiente</span></td>
              </tr>
            </tbody>
          </table>
          <button onclick="switchView('main')" class="text-[10px] text-zinc-500 hover:text-white mt-4 underline italic">← Volver al Dashboard</button>
        </div>
      `,
      clientes: `
        <div class="space-y-4 fade-in">
          <h3 class="font-bold text-purple-400 uppercase tracking-widest text-sm">Directorio de Clientes</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div class="p-4 bg-white/5 rounded-xl border border-white/5">
              <p class="font-bold text-white text-sm">Juan Pérez</p>
              <p class="text-[10px] text-zinc-500 font-mono">juan@servidor.com</p>
              <span class="mt-2 inline-block text-[9px] bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded">VIP</span>
            </div>
            <div class="p-4 bg-white/5 rounded-xl border border-white/5">
              <p class="font-bold text-white text-sm">María García</p>
              <p class="text-[10px] text-zinc-500 font-mono">maria.lab@idea.io</p>
              <span class="mt-2 inline-block text-[9px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded">LEAD</span>
            </div>
          </div>
          <button onclick="switchView('main')" class="text-[10px] text-zinc-500 hover:text-white mt-4 underline italic">← Volver al Dashboard</button>
        </div>
      `
    };

    function switchView(viewName) {
      viewport.innerHTML = views[viewName];
    }

    // --- LÓGICA MODAL ---
    function openLegal(title, content) {
      document.getElementById('legalTitle').innerText = title;
      document.getElementById('legalContent').innerText = content;
      document.getElementById('legalModal').classList.remove('hidden');
    }

    function closeLegal() {
      document.getElementById('legalModal').classList.add('hidden');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Queen Towers - Tactical Merge 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --bg-deep: #050507;
            --mq-gold: #facc15;
            --mq-cyan: #06b6d4;
            --mq-purple: #a855f7;
            --mq-red: #ef4444;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            user-select: none;
            touch-action: none; /* Crucial: evita que el móvil haga scroll al arrastrar */
        }

        /* Efecto Scanline */
        body::before {
            content: " ";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 50; pointer-events: none;
        }

        #board {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; width: 95vw; max-width: 400px; aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.02); padding: 10px;
            border-radius: 15px; border: 1px solid rgba(250, 204, 21, 0.2);
            position: relative;
        }

        .cell {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            position: relative; aspect-ratio: 1/1;
        }

        .cell.highlight { background: rgba(6, 182, 212, 0.2); border-color: var(--mq-cyan); scale: 1.05; }

        .tower {
            width: 80%; height: 80%; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; transition: transform 0.1s;
            touch-action: none; z-index: 10;
        }

        /* Niveles de Torres */
        .t-1 { background: #1f2937; border: 2px solid #4b5563; color: #9ca3af; }
        .t-2 { background: #0e7490; border: 2px solid var(--mq-cyan); box-shadow: 0 0 10px var(--mq-cyan); }
        .t-3 { background: #6b21a8; border: 2px solid var(--mq-purple); box-shadow: 0 0 10px var(--mq-purple); }
        .t-4 { background: #a16207; border: 2px solid var(--mq-gold); color: #000; box-shadow: 0 0 15px var(--mq-gold); }
        .t-5 { background: #9f1239; border: 2px solid var(--mq-red); box-shadow: 0 0 20px var(--mq-red); }

        .dragging {
            position: fixed !important;
            pointer-events: none;
            z-index: 1000 !important;
            transform: scale(1.2);
            opacity: 0.9;
        }

        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); width: 100%; overflow: hidden; }
        #income-fill { height: 100%; background: var(--mq-gold); width: 0%; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-black/80 border-b border-yellow-500/20">
        <div>
            <h1 class="text-lg font-black italic text-yellow-400">QUEEN <span class="text-white text-sm">TOWERS</span></h1>
            <div class="progress-bar mt-1"><div id="income-fill"></div></div>
        </div>
        <div class="text-right">
            <span id="currency" class="text-2xl font-bold text-white tabular-nums">0</span>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div id="board"></div>

        <div class="mt-6 w-full max-w-[400px] px-2">
            <button id="buyBtn" class="w-full bg-yellow-400 active:scale-95 text-black font-black py-4 rounded-xl flex justify-between px-6 transition-all disabled:opacity-20">
                <span>GENERAR UNIDAD T1</span>
                <span id="cost-label" class="bg-black/10 px-2 rounded">10</span>
            </button>
        </div>
    </main>

    <footer class="p-4 flex justify-between items-center bg-black/40">
        <button id="reset" class="text-zinc-600 text-[10px] font-bold uppercase tracking-tighter">
            <i class="fas fa-undo mr-1"></i> Reset Data
        </button>
        <div class="text-[10px] text-zinc-500 font-bold">MAXIQUEEN_OS // V2.0</div>
    </footer>

    <script>
        const TOWER_DATA = {
            1: { icon: 'fa-microchip', class: 't-1' },
            2: { icon: 'fa-bolt', class: 't-2' },
            3: { icon: 'fa-shield-halved', class: 't-3' },
            4: { icon: 'fa-gun', class: 't-4' },
            5: { icon: 'fa-crown', class: 't-5' }
        };

        let state = {
            credits: 50,
            buyCost: 10,
            grid: Array(16).fill(null),
            incomeTick: 0
        };

        // Persistencia
        const saved = localStorage.getItem('mq_towers_mobile');
        if (saved) state = JSON.parse(saved);

        const boardEl = document.getElementById('board');
        const currencyEl = document.getElementById('currency');
        const buyBtn = document.getElementById('buyBtn');
        const costLabel = document.getElementById('cost-label');
        const incomeFill = document.getElementById('income-fill');

        let activeDrag = { element: null, index: null, startX: 0, startY: 0 };

        function init() {
            createBoard();
            render();
            startPassiveIncome();
        }

        function createBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                boardEl.appendChild(cell);
            }
        }

        function render() {
            currencyEl.textContent = Math.floor(state.credits);
            costLabel.textContent = state.buyCost;
            buyBtn.disabled = state.credits < state.buyCost || !state.grid.includes(null);

            const cells = document.querySelectorAll('.cell');
            state.grid.forEach((data, idx) => {
                const cell = cells[idx];
                cell.innerHTML = '';
                if (data) {
                    const tower = document.createElement('div');
                    tower.className = `tower ${TOWER_DATA[data.level].class}`;
                    tower.innerHTML = `<i class="fas ${TOWER_DATA[data.level].icon} text-xl"></i>`;
                    
                    // Manejo unificado (Mouse + Touch)
                    tower.onpointerdown = (e) => startDragging(e, idx, tower);
                    
                    cell.appendChild(tower);
                }
            });
            localStorage.setItem('mq_towers_mobile', JSON.stringify(state));
        }

        function startDragging(e, idx, el) {
            activeDrag = {
                element: el,
                index: idx,
                startX: e.clientX,
                startY: e.clientY
            };
            
            el.classList.add('dragging');
            el.style.left = `${e.clientX - el.offsetWidth/2}px`;
            el.style.top = `${e.clientY - el.offsetHeight/2}px`;
            
            window.onpointermove = (e) => {
                el.style.left = `${e.clientX - el.offsetWidth/2}px`;
                el.style.top = `${e.clientY - el.offsetHeight/2}px`;
                
                // Resaltar celda debajo
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
                const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.cell');
                if (target) target.classList.add('highlight');
            };

            window.onpointerup = (e) => {
                const targetCell = document.elementFromPoint(e.clientX, e.clientY)?.closest('.cell');
                const toIdx = targetCell ? parseInt(targetCell.dataset.index) : null;
                
                stopDragging(toIdx);
            };
        }

        function stopDragging(toIdx) {
            window.onpointermove = null;
            window.onpointerup = null;
            
            if (activeDrag.element) {
                activeDrag.element.classList.remove('dragging');
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
                
                if (toIdx !== null && toIdx !== activeDrag.index) {
                    handleMerge(activeDrag.index, toIdx);
                }
            }
            activeDrag = { element: null, index: null };
            render();
        }

        function handleMerge(fromIdx, toIdx) {
            const from = state.grid[fromIdx];
            const to = state.grid[toIdx];

            if (to && to.level === from.level && from.level < 5) {
                state.grid[toIdx] = { level: from.level + 1 };
                state.grid[fromIdx] = null;
                state.credits += from.level * 20;
            } else if (!to) {
                state.grid[toIdx] = from;
                state.grid[fromIdx] = null;
            }
        }

        function buyTower() {
            const emptyIdx = state.grid.indexOf(null);
            if (emptyIdx !== -1 && state.credits >= state.buyCost) {
                state.credits -= state.buyCost;
                state.grid[emptyIdx] = { level: 1 };
                state.buyCost = Math.floor(state.buyCost * 1.3);
                render();
            }
        }

        function startPassiveIncome() {
            setInterval(() => {
                state.incomeTick += 2;
                if (state.incomeTick >= 100) {
                    state.incomeTick = 0;
                    state.grid.forEach(t => { if(t) state.credits += t.level; });
                    render();
                }
                incomeFill.style.width = state.incomeTick + '%';
            }, 100);
        }

        buyBtn.onclick = buyTower;
        document.getElementById('reset').onclick = () => {
            if(confirm("¿RESET?")) {
                localStorage.removeItem('mq_towers_mobile');
                location.reload();
            }
        };

        init();
    </script>
</body>
</html>

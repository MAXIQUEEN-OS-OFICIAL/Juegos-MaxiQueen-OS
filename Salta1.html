<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxiQueen OS - Ultra Edition</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-red: #ff3131;
            --ui-bg: rgba(5, 15, 25, 0.95);
        }

        body { 
            margin: 0; background: #010203; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace;
            color: var(--neon-blue);
        }

        #game-wrapper {
            position: relative;
            width: 800px; height: 600px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            background: radial-gradient(circle, #050a0f 0%, #000 100%);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD */
        .hud {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-around;
            z-index: 20; pointer-events: none;
        }

        .panel {
            background: var(--ui-bg);
            border: 1px solid var(--neon-blue);
            padding: 8px 20px;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
            font-weight: bold;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; text-align: center;
        }

        .btn-start {
            margin-top: 30px;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .btn-start:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 30px var(--neon-pink);
        }

        #mobile-controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px;
            box-sizing: border-box; z-index: 50;
        }

        .ctrl-btn {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--neon-blue); font-size: 24px;
            user-select: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud">
        <div class="panel">NÚCLEOS: <span id="chips-count">0/5</span></div>
        <div class="panel" id="health-display">ENERGÍA: |||</div>
    </div>

    <div id="menu-overlay" class="overlay">
        <h1 style="color: var(--neon-blue); font-size: 50px; text-shadow: 0 0 20px var(--neon-blue);">MAXIQUEEN OS</h1>
        <p>EVITA LOS PICOS ROJOS Y RECOLECTA EL CÓDIGO</p>
        <button class="btn-start" onclick="startGame()">VINCULAR SISTEMA</button>
    </div>

    <div id="end-overlay" class="overlay hidden">
        <h2 id="end-title" style="font-size: 40px;">SISTEMA REINICIADO</h2>
        <button class="btn-start" onclick="location.reload()">REINTENTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div style="display: flex; gap: 20px;">
            <div class="ctrl-btn" id="leftBtn">←</div>
            <div class="ctrl-btn" id="rightBtn">→</div>
        </div>
        <div class="ctrl-btn" id="jumpBtn" style="border-radius: 10px; width: 100px;">SALTAR</div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 600;

    // --- CONFIGURACIÓN ---
    let score = 0;
    let health = 3;
    let gameActive = false;
    let shake = 0;

    const player = {
        x: 50, y: 500, w: 30, h: 40,
        velX: 0, velY: 0,
        speed: 0.7, friction: 0.88,
        jump: -14, gravity: 0.6,
        onGround: false,
        scaleX: 1, scaleY: 1,
        trail: []
    };

    const platforms = [
        {x: 0, y: 550, w: 800, h: 50}, // Suelo
        {x: 150, y: 420, w: 150, h: 20},
        {x: 400, y: 330, w: 200, h: 20},
        {x: 100, y: 240, w: 150, h: 20},
        {x: 550, y: 180, w: 200, h: 20}
    ];

    const obstacles = [
        {x: 350, y: 530, w: 30, h: 20}, // Picos en suelo
        {x: 450, y: 310, w: 30, h: 20}, // Picos en plataforma
        {x: 150, y: 220, w: 30, h: 20}
    ];

    let chips = [];
    let bits = Array.from({length: 40}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        v: Math.random() * 2 + 1
    }));

    // --- ENTRADAS ---
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function bindTouch(id, key) {
        const btn = document.getElementById(id);
        btn.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
        btn.ontouchend = () => keys[key] = false;
    }
    bindTouch("leftBtn", "ArrowLeft");
    bindTouch("rightBtn", "ArrowRight");
    bindTouch("jumpBtn", "Space");

    // --- LÓGICA ---
    function startGame() {
        document.getElementById("menu-overlay").classList.add("hidden");
        gameActive = true;
        initLevel();
    }

    function initLevel() {
        score = 0; health = 3;
        chips = platforms.slice(1).map(p => ({
            x: p.x + p.w/2, y: p.y - 30, collected: false
        }));
    }

    function update() {
        if(!gameActive) return;

        // Movimiento e Inercia
        if (keys["ArrowLeft"]) player.velX -= player.speed;
        if (keys["ArrowRight"]) player.velX += player.speed;
        player.velX *= player.friction;
        player.x += player.velX;

        // Gravedad y Salto
        player.velY += player.gravity;
        player.y += player.velY;
        player.onGround = false;

        // Rastro (Trail)
        if(Math.abs(player.velX) > 2) {
            player.trail.push({x: player.x, y: player.y, alpha: 0.5});
            if(player.trail.length > 10) player.trail.shift();
        } else {
            player.trail.shift();
        }

        // Colisión con Plataformas
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10 &&
                player.velY >= 0) {
                player.y = p.y - player.h;
                player.velY = 0;
                player.onGround = true;
            }
        });

        if (keys["Space"] && player.onGround) {
            player.velY = player.jump;
            player.scaleX = 0.7; player.scaleY = 1.3; // Efecto estirar
        }

        // Recuperar forma original poco a poco
        player.scaleX += (1 - player.scaleX) * 0.1;
        player.scaleY += (1 - player.scaleY) * 0.1;

        // Colisión Obstáculos (Picos)
        obstacles.forEach(o => {
            if (player.x < o.x + o.w && player.x + player.w > o.x &&
                player.y < o.y + o.h && player.y + player.h > o.y) {
                damage();
            }
        });

        // Coleccionables
        chips.forEach(c => {
            if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 30) {
                c.collected = true;
                score++;
                document.getElementById("chips-count").innerText = `${score}/4`;
                if(score >= 4) victory();
            }
        });

        // Fondo animado
        bits.forEach(b => {
            b.y += b.v;
            if(b.y > canvas.height) b.y = -20;
        });

        if(shake > 0) shake *= 0.9;
    }

    function damage() {
        health--;
        shake = 10;
        player.x = 50; player.y = 400;
        document.getElementById("health-display").innerText = "ENERGÍA: " + "|".repeat(health);
        if(health <= 0) {
            gameActive = false;
            document.getElementById("end-overlay").classList.remove("hidden");
            document.getElementById("end-title").innerText = "SISTEMA CAÍDO";
        }
    }

    function victory() {
        gameActive = false;
        document.getElementById("end-overlay").classList.remove("hidden");
        document.getElementById("end-title").innerText = "ACCESO TOTAL CONCEDIDO";
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        if(shake > 0.5) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

        // Dibujar Bits de fondo
        ctx.fillStyle = "rgba(0, 242, 255, 0.1)";
        bits.forEach(b => ctx.fillText(Math.random() > 0.5 ? "1" : "0", b.x, b.y));

        // Plataformas
        ctx.shadowBlur = 10; ctx.shadowColor = "cyan";
        ctx.fillStyle = "rgba(0, 242, 255, 0.3)";
        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = "cyan";
            ctx.strokeRect(p.x, p.y, p.w, 1);
        });

        // Obstáculos (Picos)
        ctx.fillStyle = "#ff3131";
        ctx.shadowColor = "red";
        obstacles.forEach(o => {
            ctx.beginPath();
            ctx.moveTo(o.x, o.y + o.h);
            ctx.lineTo(o.x + o.w/2, o.y);
            ctx.lineTo(o.x + o.w, o.y + o.h);
            ctx.fill();
        });

        // Chips
        chips.forEach(c => {
            if(!c.collected) {
                ctx.fillStyle = "yellow";
                ctx.shadowColor = "yellow";
                ctx.beginPath();
                ctx.arc(c.x, c.y + Math.sin(Date.now()/200)*5, 8, 0, Math.PI*2);
                ctx.fill();
            }
        });

        // Rastro del Jugador
        player.trail.forEach((t, i) => {
            ctx.globalAlpha = t.alpha * (i/player.trail.length);
            ctx.fillStyle = player.color;
            ctx.fillRect(t.x, t.y, player.w, player.h);
        });
        ctx.globalAlpha = 1;

        // Jugador con Animación Squash/Stretch
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h);
        ctx.scale(player.scaleX, player.scaleY);
        ctx.fillStyle = "#00f2ff";
        ctx.shadowBlur = 15;
        ctx.fillRect(-player.w/2, -player.h, player.w, player.h);
        // "Ojos" del robot
        ctx.fillStyle = "white";
        ctx.fillRect(-10, -30, 5, 5);
        ctx.fillRect(5, -30, 5, 5);
        ctx.restore();

        ctx.restore();
        requestAnimationFrame(() => { update(); draw(); });
    }

    draw();
</script>
</body>
</html>

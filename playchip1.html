<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxiQueen OS - Cyber Mission</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --ui-bg: rgba(10, 25, 41, 0.8);
        }
        body { 
            margin: 0; background: #050a0f; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace;
            color: var(--neon-blue);
        }
        #game-container { position: relative; width: 800px; height: 600px; border: 2px solid #1a3a4a; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        canvas { background: linear-gradient(to bottom, #0d1b2a, #1b263b); display: block; width: 100%; height: 100%; }

        /* HUD Futurista basado en la imagen 10493071713569416867.jpeg */
        .hud-panel {
            position: absolute; padding: 10px; background: var(--ui-bg);
            border: 1px solid var(--neon-blue); border-radius: 5px; pointer-events: none;
        }
        #mission-panel { top: 20px; left: 20px; width: 220px; }
        #health-panel { top: 20px; right: 20px; display: flex; align-items: center; gap: 5px; }
        .battery { width: 15px; height: 25px; border: 2px solid var(--neon-blue); position: relative; }
        .battery.active { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        
        /* Controles Táctiles para Acode/Móvil */
        #controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
        }
        .btn {
            width: 70px; height: 70px; background: rgba(0,242,255,0.1);
            border: 2px solid var(--neon-blue); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 24px; pointer-events: auto;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HUD de Misión -->
    <div id="mission-panel" class="hud-panel">
        <div style="font-size: 0.8em; color: var(--neon-pink);">MISIÓN: RECOLECCIÓN</div>
        <div id="stats">CHIPS: 0 / 5</div>
        <div id="status" style="font-size: 0.7em;">ESTADO: <span style="color: #0f0;">ACTIVO</span></div>
    </div>

    <!-- Barra de Salud (Baterías) -->
    <div id="health-panel" class="hud-panel">
        <div class="battery active"></div>
        <div class="battery active"></div>
        <div class="battery active"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Controles en pantalla -->
    <div id="controls">
        <div style="display: flex; gap: 10px;">
            <div class="btn" id="btnLeft">←</div>
            <div class="btn" id="btnRight">→</div>
        </div>
        <div class="btn" id="btnJump" style="border-radius: 10px; width: 100px;">SALTAR</div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 600;

    // Lógica y Trazabilidad de Juego
    let gameState = {
        chips: 0,
        health: 3,
        active: true,
        message: ""
    };

    const player = {
        x: 100, y: 500, radius: 18, color: "#00f2ff",
        velX: 0, velY: 0, speed: 6, jump: -16, gravity: 0.8, onGround: false
    };

    let chips = [];
    let drones = [];

    function init() {
        chips = Array.from({length: 5}, () => ({ x: Math.random()*700+50, y: Math.random()*350+100, collected: false }));
        drones = [
            { x: 300, y: 200, range: 150, startY: 200, speed: 3 },
            { x: 550, y: 400, range: 100, startY: 400, speed: -4 }
        ];
    }

    // Input Logic (Teclado + Táctil)
    const keys = {};
    const setKey = (k, v) => keys[k] = v;
    window.addEventListener("keydown", e => setKey(e.code, true));
    window.addEventListener("keyup", e => setKey(e.code, false));
    
    document.getElementById("btnLeft").ontouchstart = () => setKey("ArrowLeft", true);
    document.getElementById("btnLeft").ontouchend = () => setKey("ArrowLeft", false);
    document.getElementById("btnRight").ontouchstart = () => setKey("ArrowRight", true);
    document.getElementById("btnRight").ontouchend = () => setKey("ArrowRight", false);
    document.getElementById("btnJump").ontouchstart = () => setKey("Space", true);
    document.getElementById("btnJump").ontouchend = () => setKey("Space", false);

    function update() {
        if (!gameState.active) return;

        // Movimiento Horizontal
        if (keys["ArrowLeft"]) player.velX = -player.speed;
        else if (keys["ArrowRight"]) player.velX = player.speed;
        else player.velX *= 0.8;

        player.x += player.velX;

        // Salto y Gravedad
        if (keys["Space"] && player.onGround) player.velY = player.jump;
        player.velY += player.gravity;
        player.y += player.velY;

        // Colisión Suelo
        if (player.y + player.radius > 530) {
            player.y = 530 - player.radius;
            player.velY = 0;
            player.onGround = true;
        } else { player.onGround = false; }

        // Colisión Chips
        chips.forEach(c => {
            if (!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 30) {
                c.collected = true;
                gameState.chips++;
                document.getElementById("stats").innerText = `CHIPS: ${gameState.chips} / 5`;
            }
        });

        // Lógica Drones (Enemigos)
        drones.forEach(d => {
            d.y += d.speed;
            if (Math.abs(d.y - d.startY) > d.range) d.speed *= -1;
            
            if (Math.hypot(player.x - d.x, player.y - d.y) < 30) {
                takeDamage();
            }
        });

        if (gameState.chips >= 5) winGame();
    }

    function takeDamage() {
        gameState.health--;
        player.x = 100; player.y = 500; // Reset posición
        const batteries = document.querySelectorAll(".battery");
        if (batteries[gameState.health]) batteries[gameState.health].classList.remove("active");
        if (gameState.health <= 0) endGame("SISTEMA FALLIDO");
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar Suelo Tecnológico
        ctx.fillStyle = "#1a3a4a";
        ctx.fillRect(0, 530, canvas.width, 70);
        ctx.strokeStyle = varProp("--neon-blue");
        ctx.strokeRect(0, 530, canvas.width, 2);

        // Dibujar Robot (Jugador)
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 15; ctx.shadowColor = player.color;

        // Dibujar Chips (Neon Cubes)
        chips.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = "gold";
                ctx.fillRect(c.x-10, c.y-10, 20, 20);
                ctx.shadowColor = "yellow";
                ctx.strokeRect(c.x-12, c.y-12, 24, 24);
            }
        });

        // Dibujar Drones (Triángulos con luz roja)
        drones.forEach(d => {
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.moveTo(d.x, d.y - 15);
            ctx.lineTo(d.x + 15, d.y + 15);
            ctx.lineTo(d.x - 15, d.y + 15);
            ctx.closePath();
            ctx.fill();
            ctx.shadowColor = "red";
        });

        if (gameState.message) {
            ctx.fillStyle = "white";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText(gameState.message, canvas.width/2, canvas.height/2);
        }
    }

    function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function winGame() { gameState.message = "MISIÓN CUMPLIDA"; gameState.active = false; }
    function endGame(m) { gameState.message = m; gameState.active = false; }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    init();
    loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXIQUEEN OS • CYBER-RUNNER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0066ff; --yellow: #ffcc00; --red: #ff0033; --bg: #02050a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* UI */
        #hud {
            display: flex; justify-content: space-between; padding: 15px;
            border-bottom: 2px solid var(--blue); background: rgba(0,0,0,0.8);
        }
        .stat { color: var(--yellow); font-size: 0.9rem; }
        .stat span { color: white; font-weight: 900; }

        /* Pantalla de Juego */
        #game-container {
            flex-grow: 1; position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #0a1a35, #000);
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* Controles Móviles */
        #controls {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            padding: 20px; gap: 10px; background: #000;
        }
        .btn {
            padding: 20px; background: var(--blue); color: white;
            border: none; border-radius: 10px; font-family: 'Orbitron';
            text-align: center; font-weight: 900; touch-action: manipulation;
        }
        .btn-jump { background: var(--yellow); color: #000; grid-column: 3; }
        .btn:active { opacity: 0.7; transform: scale(0.95); }

    </style>
</head>
<body>

<div id="hud">
    <div class="stat">LVL: <span id="lvl">1</span></div>
    <div class="stat">COINS: <span id="coins">0</span></div>
    <div class="stat">HP: <span id="hp">100</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="controls">
    <button class="btn" id="btnLeft">IZQ</button>
    <button class="btn" id="btnRight">DER</button>
    <button class="btn btn-jump" id="btnJump">SALTAR</button>
</div>

<script>
/** 
 * MOTOR DE JUEGO MAXIQUEEN
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Ajuste de resolución
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = canvas.parentElement.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// CONFIGURACIÓN
const config = {
    gravity: 0.8,
    jumpForce: -16,
    speed: 5,
    tileSize: 40
};

// ESTADO DEL JUEGO
const state = {
    coins: 0,
    lvl: 1,
    hp: 100,
    gameOver: false
};

// JUGADOR
const player = {
    x: 100, y: 100,
    w: 30, h: 45,
    vx: 0, vy: 0,
    grounded: false,
    color: '#0066ff'
};

// NIVELES (0: Aire, 1: Plataforma, 2: Moneda, 3: Peligro, 4: Meta)
const levels = [
    [
        "00000000000000000000000000000000",
        "00000022200000000000000000000000",
        "00000011100000000000000000000000",
        "00000000000000002220000000000000",
        "00011000000111001110000033300004",
        "11111111001111111111111111111111"
    ]
];

let currentMap = levels[0];
let platforms = [];
let items = [];

function loadLevel(idx) {
    platforms = [];
    items = [];
    const map = levels[idx];
    for (let row = 0; row < map.length; row++) {
        for (let col = 0; col < map[row].length; col++) {
            const type = map[row][col];
            const x = col * config.tileSize;
            const y = canvas.height - (map.length - row) * config.tileSize;

            if (type === '1') platforms.push({ x, y, w: config.tileSize, h: config.tileSize, type: 'solid' });
            if (type === '2') items.push({ x: x + 10, y: y + 10, w: 20, h: 20, type: 'coin', collected: false });
            if (type === '3') platforms.push({ x, y: y + 20, w: config.tileSize, h: 20, type: 'spike' });
            if (type === '4') platforms.push({ x, y, w: config.tileSize, h: config.tileSize, type: 'goal' });
        }
    }
}

// CONTROLES
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

// Eventos de botones táctiles
const bindBtn = (id, key) => {
    const btn = document.getElementById(id);
    btn.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
    btn.ontouchend = (e) => { e.preventDefault(); keys[key] = false; };
};
bindBtn('btnLeft', 'ArrowLeft');
bindBtn('btnRight', 'ArrowRight');
bindBtn('btnJump', 'Space');

function update() {
    if (state.gameOver) return;

    // Movimiento Horizontal
    if (keys['ArrowRight']) player.vx = config.speed;
    else if (keys['ArrowLeft']) player.vx = -config.speed;
    else player.vx *= 0.8;

    // Gravedad
    player.vy += config.gravity;
    player.x += player.vx;
    player.y += player.vy;

    player.grounded = false;

    // COLISIONES
    platforms.forEach(p => {
        // Colisión Rectangular
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            
            if (p.type === 'solid') {
                // Resolver colisión arriba (suelo)
                if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
                // Resolver laterales
                else if (player.vx > 0 && player.x + player.w - player.vx <= p.x) player.x = p.x - player.w;
                else if (player.vx < 0 && player.x - player.vx >= p.x + p.w) player.x = p.x + p.w;
            } 
            else if (p.type === 'spike') {
                state.hp -= 1;
                player.vy = -10; // Rebote al daño
            }
            else if (p.type === 'goal') {
                alert("¡SECTOR ASEGURADO! Nivel Completado.");
                resetPlayer();
            }
        }
    });

    // Recolección
    items.forEach(item => {
        if (!item.collected && player.x < item.x + item.w && player.x + player.w > item.x &&
            player.y < item.y + item.h && player.y + player.h > item.y) {
            item.collected = true;
            state.coins += 10;
        }
    });

    // Salto
    if (keys['Space'] && player.grounded) {
        player.vy = config.jumpForce;
        player.grounded = false;
    }

    // Límites de pantalla
    if (player.y > canvas.height) resetPlayer();
    
    // UI Update
    document.getElementById('coins').innerText = state.coins;
    document.getElementById('hp').innerText = Math.max(0, state.hp);
    if(state.hp <= 0) {
        alert("SISTEMA DAÑADO - REINICIANDO");
        location.reload();
    }
}

function resetPlayer() {
    player.x = 100;
    player.y = 100;
    player.vx = 0;
    player.vy = 0;
    state.hp = 100;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar Plataformas
    platforms.forEach(p => {
        ctx.fillStyle = p.type === 'solid' ? '#0066ff' : (p.type === 'spike' ? '#ff0033' : '#ffcc00');
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Brillo neon
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.fillStyle;
    });

    // Dibujar Items
    items.forEach(item => {
        if (!item.collected) {
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(item.x + 10, item.y + 10, 8, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Dibujar Jugador
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    // Ojos futuristas del robot
    ctx.fillStyle = '#0066ff';
    ctx.fillRect(player.x + 15, player.y + 10, 10, 5);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

// INICIO
loadLevel(0);
draw();

</script>
</body>
</html>

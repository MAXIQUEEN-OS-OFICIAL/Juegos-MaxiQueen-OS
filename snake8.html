<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEURAL HACKER: ASCENSION</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --bg-dark: #020205;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-wrapper {
            position: relative;
            padding: 10px;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
        }
        #ui-bar {
            width: 500px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-blue);
        }
        canvas {
            background: #000;
            display: block;
        }
        .msg-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border: 1px solid var(--neon-blue);
            display: none;
            z-index: 10;
        }
        .energy-bar {
            width: 100%;
            height: 5px;
            background: #222;
            margin-top: 5px;
        }
        #energy-fill {
            height: 100%;
            background: var(--neon-green);
            width: 100%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div>NIVEL: <span id="lvl-display">1</span></div>
        <div>NODOS: <span id="nodes-display">0/10</span></div>
        <div id="score-display">PUNTOS: 0</div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="overlay" class="msg-overlay">
            <h1 id="status-title">CONEXIÓN ESTABLECIDA</h1>
            <p id="status-desc">Pulsa una tecla para iniciar infiltración</p>
        </div>
    </div>
    
    <div style="width: 500px; margin-top: 10px;">
        <div style="font-size: 10px;">ENERGÍA DEL NÚCLEO (ESPACIO PARA OVERDRIVE)</div>
        <div class="energy-bar"><div id="energy-fill"></div></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const lvlDisp = document.getElementById("lvl-display");
        const nodesDisp = document.getElementById("nodes-display");
        const scoreDisp = document.getElementById("score-display");
        const energyFill = document.getElementById("energy-fill");
        const overlay = document.getElementById("overlay");

        const gridSize = 25;
        const rows = canvas.height / gridSize;
        const cols = canvas.width / gridSize;

        let snake, food, direction, score, level, nodesEaten, walls, energy, gameLoop, isOverdrive;

        // DEFINICIÓN DE NIVELES (Estrategia y Arquitectura)
        const levels = [
            { target: 5, speed: 120, walls: [] }, // Nivel 1: Espacio abierto
            { target: 10, speed: 100, walls: [
                {x: 5, y: 5, w: 10, h: 1}, {x: 5, y: 14, w: 10, h: 1} 
            ]}, // Nivel 2: Pasillos paralelos
            { target: 15, speed: 80, walls: [
                {x: 4, y: 4, w: 1, h: 12}, {x: 15, y: 4, w: 1, h: 12},
                {x: 8, y: 10, w: 4, h: 1}, {x: 0, y: 0, w: 20, h: 1}, {x: 0, y: 19, w: 20, h: 1}
            ]} // Nivel 3: El Núcleo (Laberinto)
        ];

        function initGame() {
            level = 0;
            score = 0;
            energy = 100;
            startLevel();
        }

        function startLevel() {
            snake = [{x: 10, y: 10}];
            direction = {x: 0, y: 0};
            nodesEaten = 0;
            walls = [];
            
            // Generar muros del nivel
            levels[level].walls.forEach(w => {
                for(let i=0; i<w.w; i++) {
                    for(let j=0; j<w.h; j++) {
                        walls.push({x: w.x + i, y: w.y + j});
                    }
                }
            });

            updateUI();
            showOverlay(`NIVEL ${level + 1}`, `Objetivo: Hackear ${levels[level].target} nodos.`);
            placeFood();
            run();
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * cols),
                y: Math.floor(Math.random() * rows)
            };
            // Evitar que la comida salga en muros o serpiente
            if (walls.some(w => w.x === food.x && w.y === food.y) || 
                snake.some(s => s.x === food.x && s.y === food.y)) {
                placeFood();
            }
        }

        window.addEventListener("keydown", e => {
            if (overlay.style.display === "block") {
                overlay.style.display = "none";
                return;
            }
            switch(e.key) {
                case "ArrowUp": if(direction.y === 0) direction = {x: 0, y: -1}; break;
                case "ArrowDown": if(direction.y === 0) direction = {x: 0, y: 1}; break;
                case "ArrowLeft": if(direction.x === 0) direction = {x: -1, y: 0}; break;
                case "ArrowRight": if(direction.x === 0) direction = {x: 1, y: 0}; break;
                case " ": isOverdrive = true; break;
            }
        });

        window.addEventListener("keyup", e => { if(e.key === " ") isOverdrive = false; });

        function update() {
            if (direction.x === 0 && direction.y === 0) return;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Gestión de Energía y Overdrive
            if (isOverdrive && energy > 0) {
                energy -= 2;
            } else {
                if (energy < 100) energy += 0.2;
                isOverdrive = false;
            }
            energyFill.style.width = energy + "%";

            // Colisiones (Muros o límites)
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || 
                walls.some(w => w.x === head.x && w.y === head.y) ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10 * (level + 1);
                nodesEaten++;
                placeFood();
                if (nodesEaten >= levels[level].target) nextLevel();
            } else {
                snake.pop();
            }
            updateUI();
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Rejilla de fondo (Realismo)
            ctx.strokeStyle = "#050510";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }

            // Muros (Arquitectura Neural)
            ctx.fillStyle = "#4400aa";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#9d00ff";
            walls.forEach(w => {
                ctx.fillRect(w.x * gridSize + 2, w.y * gridSize + 2, gridSize - 4, gridSize - 4);
            });

            // Comida (Nodo de Datos)
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00d4ff";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/4, 0, Math.PI*2);
            ctx.fill();

            // Serpiente (Infiltrado)
            snake.forEach((s, i) => {
                ctx.shadowBlur = (i === 0) ? 20 : 5;
                ctx.shadowColor = isOverdrive ? "#39ff14" : "#00d4ff";
                ctx.fillStyle = (i === 0) ? "#fff" : (isOverdrive ? "#39ff14" : "#00d4ff");
                ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function updateUI() {
            lvlDisp.innerText = level + 1;
            nodesDisp.innerText = `${nodesEaten}/${levels[level].target}`;
            scoreDisp.innerText = `PUNTOS: ${score}`;
        }

        function showOverlay(title, desc) {
            document.getElementById("status-title").innerText = title;
            document.getElementById("status-desc").innerText = desc;
            overlay.style.display = "block";
        }

        function nextLevel() {
            level++;
            if (level >= levels.length) {
                showOverlay("SISTEMA HACKEADO", "Has completado todos los niveles. Eres un Maestro.");
                clearInterval(gameLoop);
            } else {
                startLevel();
            }
        }

        function gameOver() {
            showOverlay("CONEXIÓN PERDIDA", "Infiltración fallida. Pulsa para reiniciar.");
            level = 0;
            score = 0;
            clearInterval(gameLoop);
            setTimeout(initGame, 100);
        }

        function run() {
            clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                update();
                draw();
            }, isOverdrive ? levels[level].speed / 2 : levels[level].speed);
        }

        initGame();
    </script>
</body>
</html>

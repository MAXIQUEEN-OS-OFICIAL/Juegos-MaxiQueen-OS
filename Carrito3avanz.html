<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAXIQUEEN OS • NITRO RACER OVERDRIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #fff200;
            --neon-green: #00ff66;
            --dark-space: #02050a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }

        body {
            background: var(--dark-space);
            color: white;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HUD SUPERIOR DINÁMICO */
        #hud {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--neon-blue);
            z-index: 10;
        }

        .stat-group { text-align: center; }
        .label { font-size: 0.6rem; color: var(--neon-blue); text-transform: uppercase; display: block; }
        .value { font-size: 1rem; font-weight: 900; text-shadow: 0 0 8px var(--neon-blue); }

        /* BARRA DE PROGRESO DE NIVEL */
        #level-progress-container {
            position: absolute;
            top: 60px; left: 10%; width: 80%;
            height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; z-index: 5;
        }
        #level-progress-bar {
            width: 0%; height: 100%; background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 0.3s;
        }

        #game-stage { flex-grow: 1; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        /* NOTIFICACIONES EN PANTALLA */
        #alerts {
            position: absolute;
            top: 40%; width: 100%; text-align: center;
            font-size: 2rem; font-weight: 900; color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            pointer-events: none; opacity: 0; transition: 0.3s;
        }

        /* CONTROLES MÓVILES */
        #controls {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; padding: 15px; background: #000;
        }
        .btn {
            height: 70px; border: 1px solid rgba(0,243,255,0.3);
            border-radius: 12px; background: rgba(255,255,255,0.05);
            color: white; font-family: 'Orbitron'; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn:active { background: var(--neon-blue); color: black; }
        .btn-nitro { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-nitro.active { background: var(--neon-pink); color: white; animation: blink 0.5s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            visibility: hidden;
        }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat-group">
        <span class="label">LEVEL</span>
        <span id="level-val" class="value">1</span>
    </div>
    <div class="stat-group">
        <span class="label">SPEED</span>
        <span id="speed-val" class="value">0</span>
    </div>
    <div class="stat-group">
        <span class="label">CREDITS</span>
        <span id="coin-val" class="value">0</span>
    </div>
</div>

<div id="level-progress-container">
    <div id="level-progress-bar"></div>
</div>

<div id="game-stage">
    <canvas id="gameCanvas"></canvas>
    <div id="alerts">LEVEL UP</div>
    <div id="overlay">
        <h1 id="over-title" style="color: var(--neon-pink); margin-bottom: 20px;">SISTEMA OFFLINE</h1>
        <button class="btn" style="width: 200px;" onclick="location.reload()">REBOOT</button>
    </div>
</div>

<div id="controls">
    <button class="btn" id="lBtn">◀ IZQ</button>
    <button class="btn btn-nitro" id="nitroBtn">
        <span style="font-size: 0.5rem">HYPER</span>
        NITRO
    </button>
    <button class="btn" id="rBtn">DER ▶</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CONFIG = {
        lanes: 3,
        baseSpeed: 7,
        maxLevel: 5,
        colors: {
            l1: '#00f3ff', // City
            l2: '#00ff66', // Forest/Bio
            l3: '#ff00ff', // Void
            nitro: '#fff200'
        }
    };

    const Game = {
        state: 'START',
        level: 1,
        progress: 0,
        speed: CONFIG.baseSpeed,
        coins: 0,
        hp: 100,
        nitroCharge: 0,
        isNitroActive: false,
        shieldActive: false,
        lane: 1,
        currentX: 0,
        targetX: 0,
        entities: [],
        particles: [],
        shake: 0,

        init() {
            this.resize();
            window.onresize = () => this.resize();
            this.setupInputs();
            this.loop();
            this.spawnLogic();
        },

        resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            this.targetX = (canvas.width / 3) * this.lane + (canvas.width / 6);
            this.currentX = this.targetX;
        },

        setupInputs() {
            const move = (dir) => {
                this.lane = Math.max(0, Math.min(2, this.lane + dir));
                this.targetX = (canvas.width / 3) * this.lane + (canvas.width / 6);
            };

            document.getElementById('lBtn').onpointerdown = () => move(-1);
            document.getElementById('rBtn').onpointerdown = () => move(1);
            document.getElementById('nitroBtn').onpointerdown = () => this.activateNitro();

            window.onkeydown = (e) => {
                if(e.key === 'ArrowLeft') move(-1);
                if(e.key === 'ArrowRight') move(1);
                if(e.key === ' ') this.activateNitro();
            };
        },

        activateNitro() {
            if(this.nitroCharge >= 100 && !this.isNitroActive) {
                this.isNitroActive = true;
                this.nitroCharge = 0;
                this.shake = 20;
                let originalSpeed = this.speed;
                this.speed *= 2.5;
                setTimeout(() => {
                    this.isNitroActive = false;
                    this.speed = originalSpeed;
                }, 3000);
            }
        },

        spawnLogic() {
            if(this.state !== 'PLAYING') {
                setTimeout(() => this.spawnLogic(), 1000);
                return;
            }

            const lane = Math.floor(Math.random() * 3);
            const x = (canvas.width/3) * lane + (canvas.width/6);
            
            const r = Math.random();
            if(r < 0.6) {
                this.entities.push({ type: 'enemy', x, y: -100, speed: this.speed + 2, lane });
            } else if(r < 0.8) {
                this.entities.push({ type: 'coin', x, y: -100 });
            } else {
                this.entities.push({ type: 'nitro', x, y: -100 });
            }

            let delay = Math.max(300, 1000 - (this.level * 150));
            setTimeout(() => this.spawnLogic(), delay);
        },

        update(dt) {
            if(this.state !== 'PLAYING') return;

            // Suavizado de posición
            this.currentX += (this.targetX - this.currentX) * 0.15;

            // Progreso de nivel
            this.progress += 0.05;
            if(this.progress >= 100) {
                this.levelUp();
            }
            document.getElementById('level-progress-bar').style.width = this.progress + '%';

            // Entidades
            for(let i = this.entities.length - 1; i >= 0; i--) {
                let e = this.entities[i];
                e.y += this.isNitroActive ? this.speed : (e.speed || this.speed);

                // Colisión simplificada
                let dist = Math.hypot(e.x - this.currentX, e.y - (canvas.height - 120));
                if(dist < 40) {
                    this.handleCollision(e, i);
                }

                if(e.y > canvas.height + 100) this.entities.splice(i, 1);
            }

            // Partículas de escape
            if(Math.random() > 0.2) {
                this.particles.push({
                    x: this.currentX + (Math.random() - 0.5) * 20,
                    y: canvas.height - 80,
                    v: Math.random() * 5 + 2,
                    size: Math.random() * 5,
                    life: 1
                });
            }

            for(let i = this.particles.length - 1; i >= 0; i--) {
                let p = this.particles[i];
                p.y += p.v;
                p.life -= 0.02;
                if(p.life <= 0) this.particles.splice(i, 1);
            }

            if(this.shake > 0) this.shake *= 0.9;
            
            this.updateUI();
        },

        handleCollision(e, index) {
            if(e.type === 'enemy') {
                if(this.isNitroActive) {
                    this.entities.splice(index, 1);
                    this.coins += 50;
                } else {
                    this.hp -= 34;
                    this.shake = 15;
                    this.entities.splice(index, 1);
                    if(this.hp <= 0) this.gameOver();
                }
            } else if(e.type === 'coin') {
                this.coins += 10;
                this.entities.splice(index, 1);
            } else if(e.type === 'nitro') {
                this.nitroCharge = Math.min(100, this.nitroCharge + 20);
                this.entities.splice(index, 1);
            }
        },

        levelUp() {
            this.level++;
            this.progress = 0;
            this.speed += 2;
            this.showAlert("ZONA ACTUALIZADA");
            if(this.level > CONFIG.maxLevel) this.state = 'WIN';
        },

        showAlert(txt) {
            const el = document.getElementById('alerts');
            el.innerText = txt;
            el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 2000);
        },

        updateUI() {
            document.getElementById('speed-val').innerText = Math.floor(this.speed * 20);
            document.getElementById('coin-val').innerText = this.coins;
            document.getElementById('level-val').innerText = this.level;
            
            const nBtn = document.getElementById('nitroBtn');
            if(this.nitroCharge >= 100) nBtn.classList.add('active');
            else nBtn.classList.remove('active');
        },

        draw() {
            ctx.save();
            if(this.shake > 1) {
                ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
            }

            // Fondo dinámico según nivel
            let hue = (this.level * 60) % 360;
            ctx.fillStyle = `hsla(${hue}, 30%, 5%, 0.3)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Carretera 2026
            ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.2)`;
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -performance.now() / 10;
            for(let i=1; i<3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * canvas.width/3, 0);
                ctx.lineTo(i * canvas.width/3, canvas.height);
                ctx.stroke();
            }

            // Partículas
            this.particles.forEach(p => {
                ctx.fillStyle = `rgba(0, 243, 255, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });

            // Entidades
            this.entities.forEach(e => {
                ctx.shadowBlur = 15;
                if(e.type === 'enemy') {
                    ctx.fillStyle = '#ff0055';
                    ctx.shadowColor = '#ff0055';
                    ctx.fillRect(e.x - 20, e.y - 20, 40, 40);
                } else if(e.type === 'coin') {
                    ctx.fillStyle = CONFIG.colors.nitro;
                    ctx.shadowColor = CONFIG.colors.nitro;
                    ctx.beginPath(); ctx.arc(e.x, e.y, 15, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = CONFIG.colors.l2;
                    ctx.shadowColor = CONFIG.colors.l2;
                    ctx.fillRect(e.x - 15, e.y - 15, 30, 30);
                }
            });

            // Jugador
            const py = canvas.height - 120;
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.isNitroActive ? CONFIG.colors.pink : CONFIG.colors.l1;
            ctx.fillStyle = ctx.shadowColor;
            
            // Cuerpo Nave
            ctx.beginPath();
            ctx.moveTo(this.currentX, py - 30);
            ctx.lineTo(this.currentX - 25, py + 30);
            ctx.lineTo(this.currentX + 25, py + 30);
            ctx.closePath();
            ctx.fill();

            // Alas / Efecto Nitro
            if(this.isNitroActive) {
                ctx.strokeStyle = 'white';
                ctx.strokeRect(this.currentX - 35, py, 70, 40);
            }

            ctx.restore();
        },

        loop() {
            this.update();
            this.draw();
            requestAnimationFrame(() => this.loop());
        },

        gameOver() {
            this.state = 'OVER';
            document.getElementById('overlay').style.visibility = 'visible';
        }
    };

    window.onload = () => {
        Game.state = 'PLAYING';
        Game.init();
    };
</script>
</body>
</html>

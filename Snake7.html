<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEURAL HACKER: EVOLUTION</title>
    <style>
        :root {
            --neon: #39ff14; --cyber: #00d4ff; --alert: #ff003c; --bg: #010103;
        }
        body {
            background: var(--bg); color: var(--cyber);
            font-family: 'Consolas', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        #game-container {
            position: relative; border: 2px solid #111;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
        }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        /* Efecto de líneas de escaneo (Scanlines) */
        #game-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        .hud {
            width: 600px; display: flex; justify-content: space-between;
            padding: 10px; font-size: 14px; letter-spacing: 2px;
            border-bottom: 1px solid #222; margin-bottom: 5px;
        }
        .bar-container { width: 600px; height: 4px; background: #111; margin-top: 5px; }
        #energy-bar { height: 100%; width: 100%; background: var(--neon); transition: 0.1s; }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0,0,0,0.9); padding: 40px;
            border: 1px solid var(--cyber); display: none; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div>NODE_SEC: <span id="lvl-txt">01</span></div>
        <div id="status-txt">ESTADO: INFILTRANDO...</div>
        <div>DATA_RECOVERY: <span id="score-txt">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="c" width="600" height="400"></canvas>
        <div id="msg">
            <h1 id="m-title">CONEXIÓN PERDIDA</h1>
            <p id="m-desc">Pulsa ESPACIO para reiniciar protocolo</p>
        </div>
    </div>

    <div class="bar-container"><div id="energy-bar"></div></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-txt'), lvlTxt = document.getElementById('lvl-txt');
        const energyBar = document.getElementById('energy-bar'), msgBox = document.getElementById('msg');

        const TILE = 20, COLS = canvas.width/TILE, ROWS = canvas.height/TILE;
        let snake, direction, items, walls, score, level, energy, particles, gameRunning;

        // ESTRUCTURA DE NIVELES (Estrategia de arquitectura)
        const LEVELS = [
            { target: 5, speed: 100, walls: [] },
            { target: 10, speed: 90, walls: [{x: 5, y: 5, w: 20, h: 1}, {x: 5, y: 15, w: 20, h: 1}] },
            { target: 15, speed: 80, walls: [{x: 10, y: 2, w: 1, h: 16}, {x: 20, y: 2, w: 1, h: 16}] },
            { target: 20, speed: 70, walls: [{x: 0, y: 0, w: 30, h: 1}, {x: 0, y: 19, w: 30, h: 1}, {x: 15, y: 5, w: 1, h: 10}] },
            { target: 25, speed: 60, walls: [{x: 5, y: 5, w: 5, h: 5}, {x: 20, y: 5, w: 5, h: 5}, {x: 12, y: 12, w: 6, h: 2}] }
        ];

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.v = { x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8 };
                this.life = 1.0; this.color = color;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 2, 2);
                this.x += this.v.x; this.y += this.v.y;
                this.life -= 0.04;
            }
        }

        function init() {
            snake = [{x: 15, y: 10}]; direction = {x: 1, y: 0};
            items = []; particles = []; walls = [];
            score = 0; level = 0; energy = 100;
            loadLevel();
            gameRunning = true;
            msgBox.style.display = 'none';
            loop();
        }

        function loadLevel() {
            walls = [];
            LEVELS[level].walls.forEach(w => {
                for(let i=0; i<w.w; i++) for(let j=0; j<w.h; j++) walls.push({x: w.x+i, y: w.y+j});
            });
            spawnItem('DATA');
            lvlTxt.innerText = (level + 1).toString().padStart(2, '0');
        }

        function spawnItem(type) {
            let p = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS), type: type };
            if (walls.some(w => w.x == p.x && w.y == p.y) || snake.some(s => s.x == p.x && s.y == p.y)) return spawnItem(type);
            items.push(p);
        }

        window.onkeydown = e => {
            const keys = { 37: {x:-1, y:0}, 38: {x:0, y:-1}, 39: {x:1, y:0}, 40: {x:0, y:1} };
            if (keys[e.keyCode]) {
                let move = keys[e.keyCode];
                if (move.x !== -direction.x && move.y !== -direction.y) direction = move;
            }
            if (e.keyCode === 32 && !gameRunning) init();
        };

        function update() {
            if (!gameRunning) return;

            // Overdrive con Energía
            let actualSpeed = LEVELS[level].speed;
            energy = Math.min(100, energy + 0.1);
            energyBar.style.width = energy + "%";

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Colisiones
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || 
                walls.some(w => w.x == head.x && w.y == head.y) ||
                snake.some(s => s.x == head.x && s.y == head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // Lógica de Items (Estrategia)
            let itemIdx = items.findIndex(i => i.x == head.x && i.y == head.y);
            if (itemIdx !== -1) {
                let it = items[itemIdx];
                createExplosion(it.x*TILE, it.y*TILE, it.type == 'DATA' ? varC('--neon') : varC('--cyber'));
                
                if (it.type == 'DATA') {
                    score += 10;
                    if (score % 50 == 0) spawnItem('CLEANER'); // Aparece cada 50 puntos
                } else if (it.type == 'CLEANER') {
                    snake.splice(-3); // Estrategia: Reduce longitud para mejorar maniobra
                }

                items.splice(itemIdx, 1);
                spawnItem('DATA');
                if (score >= LEVELS[level].target * 10) nextLevel();
            } else {
                snake.pop();
            }
            
            scoreTxt.innerText = score;
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) particles.push(new Particle(x + TILE/2, y + TILE/2, color));
        }

        function nextLevel() {
            level++;
            if (level >= LEVELS.length) {
                gameRunning = false;
                showMsg("SISTEMA HACKEADO", "Has alcanzado el núcleo central.");
            } else {
                createExplosion(canvas.width/2, canvas.height/2, varC('--cyber'));
                loadLevel();
            }
        }

        function gameOver() {
            gameRunning = false;
            showMsg("CONEXIÓN INTERCEPTADA", "Protocolo de seguridad activado.");
        }

        function showMsg(t, d) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-desc').innerText = d;
            msgBox.style.display = 'block';
        }

        function draw() {
            ctx.fillStyle = varC('--bg');
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Muros (Realistic Shader-like)
            walls.forEach(w => {
                let g = ctx.createLinearGradient(w.x*TILE, w.y*TILE, (w.x+1)*TILE, (w.y+1)*TILE);
                g.addColorStop(0, '#1a0033'); g.addColorStop(1, '#4400aa');
                ctx.fillStyle = g;
                ctx.fillRect(w.x*TILE + 1, w.y*TILE + 1, TILE - 2, TILE - 2);
            });

            // Dibujar Items
            items.forEach(it => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = it.type == 'DATA' ? varC('--neon') : varC('--cyber');
                ctx.fillStyle = ctx.shadowColor;
                ctx.beginPath();
                ctx.arc(it.x*TILE + TILE/2, it.y*TILE + TILE/2, TILE/4, 0, Math.PI*2);
                ctx.fill();
            });

            // Dibujar Serpiente
            snake.forEach((s, i) => {
                ctx.shadowBlur = i == 0 ? 20 : 0;
                ctx.shadowColor = varC('--cyber');
                ctx.fillStyle = i == 0 ? "#fff" : `rgba(0, 212, 255, ${1 - i/snake.length})`;
                ctx.fillRect(s.x*TILE + 1, s.y*TILE + 1, TILE - 2, TILE - 2);
            });

            // Dibujar Partículas
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.draw());
            
            ctx.shadowBlur = 0;
        }

        function loop() {
            if (gameRunning) {
                update();
                draw();
                setTimeout(loop, LEVELS[level].speed);
            }
        }

        function varC(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MaxiQueen OS | Neon Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ffcc;
            --neon-red: #ff0055;
            --bg-dark: #050508;
            --grid-color: rgba(0, 255, 204, 0.05);
            --ui-glow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none; /* Previene scroll en móviles */
        }

        /* Canvas Background / Grid via CSS for performance */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: 
                linear-gradient(transparent 95%, var(--grid-color) 100%),
                linear-gradient(90deg, transparent 95%, var(--grid-color) 100%);
            background-size: 30px 30px;
            box-shadow: inset 0 0 100px rgba(0, 255, 204, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .score-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-green);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            box-shadow: var(--ui-glow);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .score-box span {
            font-weight: 900;
            color: var(--neon-green);
            font-size: 18px;
        }

        /* Screens (Start, Game Over, Pause) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(12px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        .title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green);
            margin-bottom: 10px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        .subtitle {
            font-size: 1rem;
            color: #aaa;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .btn {
            background: transparent;
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            border: 2px solid var(--neon-green);
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .btn:hover, .btn:active {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-green);
            transform: scale(1.05);
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green); }
            50% { text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); }
        }

        /* Mobile Controls */
        .mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 15px;
            z-index: 15;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        @media (min-width: 768px) {
            .mobile-controls { display: none; }
        }

        .mobile-controls:active { opacity: 1; }

        .d-btn {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--neon-green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-green);
            font-size: 24px;
            backdrop-filter: blur(4px);
        }
        
        .d-btn:active { background: rgba(0, 255, 204, 0.4); }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        /* Cinematic Game Over Additions */
        #game-over-screen .title {
            color: var(--neon-red);
            -webkit-text-stroke: 2px var(--neon-red);
            text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
        }
        #game-over-screen .btn {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }
        #game-over-screen .btn:hover {
            background: var(--neon-red);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-red);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="score-box">Score: <span id="current-score">0</span></div>
        <div class="score-box">High: <span id="high-score">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="subtitle">MaxiQueen OS Presenta</div>
        <div class="title">NEON SNAKE</div>
        <button class="btn" id="start-btn">Iniciar Sistema</button>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" class="screen">
        <div class="title">SISTEMA PAUSADO</div>
        <button class="btn" id="resume-btn">Reanudar</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen">
        <div class="subtitle">Enlace Perdido</div>
        <div class="title">GAME OVER</div>
        <div style="margin-bottom: 30px; font-size: 1.5rem;">Puntos Obtenidos: <span id="final-score" style="color: var(--neon-red); font-weight: bold;">0</span></div>
        <button class="btn" id="restart-btn">Reiniciar Ciclo</button>
    </div>

    <!-- Mobile Controls -->
    <div class="mobile-controls">
        <div class="d-btn btn-up" id="btn-up">▲</div>
        <div class="d-btn btn-left" id="btn-left">◀</div>
        <div class="d-btn btn-down" id="btn-down">▼</div>
        <div class="d-btn btn-right" id="btn-right">▶</div>
    </div>
</div>

<script>
    /**
     * MaxiQueen OS - Neon Snake Engine
     * Arquitectura: ES6 Modules/Classes pattern
     * Render: HTML5 Canvas + API de partículas
     */

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Optimización de renderizado

    // UI Elements
    const startScreen = document.getElementById('start-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const scoreEl = document.getElementById('current-score');
    const highScoreEl = document.getElementById('high-score');
    const finalScoreEl = document.getElementById('final-score');

    // Configuración Core
    const CONFIG = {
        gridSize: 20, // Tamaño del segmento en píxeles
        initialSpeed: 120, // ms entre movimientos
        minSpeed: 45, // Velocidad máxima (ms mínimos)
        speedDecrement: 2, // Cuánto se acelera al comer
        colors: {
            snakeHead: '#ffffff',
            snakeBody: '#00ffcc',
            food: '#ff0055',
            bg: '#050508'
        }
    };

    // Estado Global
    let STATE = {
        isRunning: false,
        isPaused: false,
        score: 0,
        highScore: localStorage.getItem('mq_neon_highscore') || 0,
        cols: 0,
        rows: 0,
        lastTime: 0,
        moveAccumulator: 0,
        currentSpeed: CONFIG.initialSpeed
    };

    highScoreEl.innerText = STATE.highScore;

    // Sistema de Partículas (Visuales premium)
    class ParticleSystem {
        constructor() {
            this.particles = [];
        }
        
        spawn(x, y, color, amount = 15) {
            for (let i = 0; i < amount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.particles.push({
                    x: x + CONFIG.gridSize / 2,
                    y: y + CONFIG.gridSize / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    decay: Math.random() * 0.03 + 0.02,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }

        updateAndDraw(ctx) {
            for (let i = this.particles.length - 1; i >= 0; i--) {
                let p = this.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;

                if (p.life <= 0) {
                    this.particles.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    const particles = new ParticleSystem();

    // Entidades del Juego
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0, angle: 0 };

    // Inicialización y Redimensionamiento
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        STATE.cols = Math.floor(canvas.width / CONFIG.gridSize);
        STATE.rows = Math.floor(canvas.height / CONFIG.gridSize);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Lógica principal
    function initGame() {
        // Centrar serpiente inicial
        const startX = Math.floor(STATE.cols / 2);
        const startY = Math.floor(STATE.rows / 2);
        snake = [
            { x: startX, y: startY },
            { x: startX - 1, y: startY },
            { x: startX - 2, y: startY }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        STATE.score = 0;
        STATE.currentSpeed = CONFIG.initialSpeed;
        scoreEl.innerText = STATE.score;
        particles.particles = [];
        spawnFood();
        
        STATE.isRunning = true;
        STATE.isPaused = false;
        startScreen.classList.remove('active');
        gameOverScreen.classList.remove('active');
        pauseScreen.classList.remove('active');
        
        requestAnimationFrame(gameLoop);
    }

    function spawnFood() {
        let validPos = false;
        while (!validPos) {
            food.x = Math.floor(Math.random() * STATE.cols);
            food.y = Math.floor(Math.random() * STATE.rows);
            validPos = !snake.some(segment => segment.x === food.x && segment.y === food.y);
        }
    }

    function gameOver() {
        STATE.isRunning = false;
        if (STATE.score > STATE.highScore) {
            STATE.highScore = STATE.score;
            localStorage.setItem('mq_neon_highscore', STATE.highScore);
            highScoreEl.innerText = STATE.highScore;
        }
        finalScoreEl.innerText = STATE.score;
        gameOverScreen.classList.add('active');
        
        // Haptic feedback si está disponible
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    // Input Handling
    function handleInput(dir) {
        if (dir === 'UP' && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        if (dir === 'DOWN' && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        if (dir === 'LEFT' && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        if (dir === 'RIGHT' && direction.x !== -1) nextDirection = { x: 1, y: 0 };
    }

    // Keyboard
    window.addEventListener('keydown', e => {
        if (!STATE.isRunning) return;
        switch(e.key) {
            case 'ArrowUp': case 'w': case 'W': handleInput('UP'); break;
            case 'ArrowDown': case 's': case 'S': handleInput('DOWN'); break;
            case 'ArrowLeft': case 'a': case 'A': handleInput('LEFT'); break;
            case 'ArrowRight': case 'd': case 'D': handleInput('RIGHT'); break;
            case 'Escape': case ' ': togglePause(); break;
        }
    });

    // Touch / Swipe
    let touchStartX = 0;
    let touchStartY = 0;
    window.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});

    window.addEventListener('touchend', e => {
        if (!STATE.isRunning || STATE.isPaused) return;
        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;
        let dx = touchEndX - touchStartX;
        let dy = touchEndY - touchStartY;
        
        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > 30) handleInput(dx > 0 ? 'RIGHT' : 'LEFT');
        } else {
            if (Math.abs(dy) > 30) handleInput(dy > 0 ? 'DOWN' : 'UP');
        }
    });

    // Mobile Buttons (Para mayor accesibilidad)
    document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); handleInput('UP'); });
    document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); handleInput('DOWN'); });
    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); handleInput('LEFT'); });
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); handleInput('RIGHT'); });

    function togglePause() {
        if (!STATE.isRunning) return;
        STATE.isPaused = !STATE.isPaused;
        if (STATE.isPaused) {
            pauseScreen.classList.add('active');
        } else {
            pauseScreen.classList.remove('active');
            STATE.lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
    }

    // Engine Loop
    function update() {
        direction = nextDirection;
        const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

        // Colisión con paredes (Modo Tron cerrado)
        if (head.x < 0 || head.x >= STATE.cols || head.y < 0 || head.y >= STATE.rows) {
            gameOver();
            return;
        }

        // Colisión consigo misma
        if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);

        // Comer comida
        if (head.x === food.x && head.y === food.y) {
            STATE.score += 10;
            scoreEl.innerText = STATE.score;
            particles.spawn(food.x * CONFIG.gridSize, food.y * CONFIG.gridSize, CONFIG.colors.food);
            
            // Dificultad Dinámica
            if (STATE.currentSpeed > CONFIG.minSpeed) {
                STATE.currentSpeed -= CONFIG.speedDecrement;
            }
            
            if (navigator.vibrate) navigator.vibrate(50);
            spawnFood();
        } else {
            snake.pop();
        }
    }

    function draw() {
        // Fondo con efecto Trail (Motion Blur ligero)
        ctx.fillStyle = 'rgba(5, 5, 8, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar Comida (Efecto Pulse UI)
        food.angle += 0.1;
        const foodPulse = Math.sin(food.angle) * 3;
        ctx.fillStyle = CONFIG.colors.food;
        ctx.shadowBlur = 15 + foodPulse;
        ctx.shadowColor = CONFIG.colors.food;
        ctx.beginPath();
        ctx.arc(
            food.x * CONFIG.gridSize + CONFIG.gridSize / 2, 
            food.y * CONFIG.gridSize + CONFIG.gridSize / 2, 
            CONFIG.gridSize / 2 - 2, 
            0, Math.PI * 2
        );
        ctx.fill();

        // Dibujar Serpiente
        snake.forEach((segment, index) => {
            const isHead = index === 0;
            const sizeOffset = isHead ? 0 : 2; // Cuerpo ligeramente más delgado
            
            ctx.fillStyle = isHead ? CONFIG.colors.snakeHead : CONFIG.colors.snakeBody;
            ctx.shadowBlur = isHead ? 20 : 10;
            ctx.shadowColor = CONFIG.colors.snakeBody;
            
            ctx.fillRect(
                segment.x * CONFIG.gridSize + sizeOffset,
                segment.y * CONFIG.gridSize + sizeOffset,
                CONFIG.gridSize - (sizeOffset * 2),
                CONFIG.gridSize - (sizeOffset * 2)
            );
        });

        // Reset sombra para partículas
        ctx.shadowBlur = 0;
        particles.updateAndDraw(ctx);
    }

    function gameLoop(timestamp) {
        if (!STATE.isRunning || STATE.isPaused) return;

        const deltaTime = timestamp - STATE.lastTime;
        STATE.lastTime = timestamp;
        STATE.moveAccumulator += deltaTime;

        // Físicas independientes del framerate
        if (STATE.moveAccumulator >= STATE.currentSpeed) {
            update();
            STATE.moveAccumulator = 0;
        }

        // Render siempre va lo más rápido posible (60/120fps)
        draw();
        
        if (STATE.isRunning) {
            requestAnimationFrame(gameLoop);
        }
    }

    // Bindings de botones UI
    document.getElementById('start-btn').addEventListener('click', () => {
        STATE.lastTime = performance.now();
        initGame();
    });
    
    document.getElementById('restart-btn').addEventListener('click', () => {
        STATE.lastTime = performance.now();
        initGame();
    });
    
    document.getElementById('resume-btn').addEventListener('click', togglePause);

    // Render Inicial
    ctx.fillStyle = CONFIG.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
